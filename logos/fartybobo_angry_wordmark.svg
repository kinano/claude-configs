<svg width="720" height="160" viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow behind avatar -->
  <circle cx="80" cy="80" r="72" fill="#7F77DD" opacity="0.1"/>
  <circle cx="80" cy="80" r="60" fill="#97C459" opacity="0.12"/>

  <!-- Avatar head -->
  <circle cx="80" cy="76" r="56" fill="#7F77DD"/>
  <circle cx="80" cy="76" r="56" fill="none" stroke="#534AB7" stroke-width="2"/>
  <!-- Highlight -->
  <ellipse cx="80" cy="86" rx="34" ry="22" fill="#AFA9EC" opacity="0.2"/>

  <!-- Glasses -->
  <rect x="52" y="56" width="24" height="18" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="82" y="56" width="24" height="18" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="76" y1="65" x2="82" y2="65" stroke="white" stroke-width="2.5"/>
  <!-- Pupils -->
  <circle cx="64" cy="65" r="5" fill="white"/>
  <circle cx="94" cy="65" r="5" fill="white"/>

  <!-- Angry brows -->
  <path d="M50 52 Q62 44 78 50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M82 50 Q98 44 110 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Screaming mouth -->
  <ellipse cx="80" cy="96" rx="20" ry="14" fill="#3C3489"/>
  <ellipse cx="80" cy="93" rx="16" ry="8" fill="#534AB7"/>
  <!-- Teeth -->
  <path d="M66 88 L70 94 L74 88 L78 94 L82 88 L86 94 L90 88 L94 94" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Tongue -->
  <ellipse cx="80" cy="103" rx="10" ry="5" fill="#D4537E"/>

  <!-- Rage sparks -->
  <path d="M105 42 L112 30 M112 46 L120 34" fill="none" stroke="#E24B4A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Gas wisps from left -->
  <circle cx="18" cy="92" r="12" fill="#97C459" opacity="0.35"/>
  <circle cx="10" cy="76" r="9" fill="#97C459" opacity="0.28"/>
  <circle cx="14" cy="60" r="6" fill="#97C459" opacity="0.2"/>
  <path d="M8 52 Q2 38 8 24" fill="none" stroke="#97C459" stroke-width="1.8" stroke-linecap="round" opacity="0.22"/>

  <!-- Wordmark text — BIG and BOLD -->
  <text x="165" y="96" font-family="Impact, 'Arial Black', Helvetica, sans-serif" font-weight="900" font-size="72" letter-spacing="3">
    <tspan fill="#7F77DD">FARTY</tspan><tspan fill="#AFA9EC">BOBO</tspan>
  </text>

  <!-- Underline accent -->
  <line x1="165" y1="110" x2="570" y2="110" stroke="#97C459" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
